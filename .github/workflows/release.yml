name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester)) {
            Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
          }

      - name: Run preflight
        shell: pwsh
        run: ./scripts/preflight.ps1

      - name: Package repository artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ./artifacts/release -Force | Out-Null
          $artifactPath = "./artifacts/release/cypress-skill-${{ github.ref_name }}.zip"
          $items = @(
            "./README.md",
            "./SKILL.md",
            "./CHANGELOG.md",
            "./CONTRIBUTING.md",
            "./LICENSE",
            "./agents",
            "./analysis",
            "./ci",
            "./core",
            "./coverage_plan",
            "./cypress-cli",
            "./documentation",
            "./installers",
            "./mappers",
            "./migration",
            "./orchestrator",
            "./pom",
            "./reporters",
            "./reporting",
            "./reports",
            "./scripts",
            "./transformers",
            "./tests"
          )
          Compress-Archive -Path $items -DestinationPath $artifactPath -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cypress-skill-release-${{ github.ref_name }}
          path: ./artifacts/release

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/release/*.zip
          generate_release_notes: true
