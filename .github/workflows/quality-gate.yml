name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable Pester)) {
            Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
          }

      - name: Run repository quality gate
        shell: pwsh
        run: ./scripts/quality-gate.ps1

      - name: Run Cypress handover Pester suite
        shell: pwsh
        run: ./scripts/check-cypress-handover-pester.ps1 -ResultsPath ./artifacts/pester/cypress-handover.xml

      - name: Upload Cypress handover Pester results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-handover-pester-results
          path: ./artifacts/pester
